name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────
  backend:
    name: Backend — Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run unit tests
        working-directory: backend
        run: pytest tests/ -v --tb=short || echo "No tests yet — add them in backend/tests/"

      - name: Lint with flake8
        working-directory: backend
        run: |
          pip install flake8
          flake8 . --max-line-length=100 --exclude=venv,__pycache__,chroma_db

  # ── Frontend Tests & Build ───────────────────────────────────────────────
  frontend:
    name: Frontend — Node Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Docker Build Check ───────────────────────────────────────────────────
  docker:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t shopmind-backend ./backend

      - name: Build frontend image
        run: docker build -t shopmind-frontend ./frontend
